replicaCount: 1

image:
  repository: laaasilva/dracolich
  tag: mtg-library-api-latest
  pullPolicy: IfNotPresent

service:
  appPort: 8080
  managementPort: 7980

probes:
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness
  livenessInitialDelaySeconds: 30
  readinessInitialDelaySeconds: 10

resources:
  requests:
    cpu: 100m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1536Mi

env:
  SPRING_PROFILES_ACTIVE: dev
  # Cap JVM heap below the container limit so the GC kicks in before kubelet
  # starts an OOMKill. Headroom for native, metaspace, JIT codeheap.
  JAVA_TOOL_OPTIONS: "-XX:MaxRAMPercentage=70"

# envFrom: list of ConfigMap/Secret refs (mongo URI etc.)
# Created out-of-band for now (kubectl create secret generic mtg-library-secrets ...).
envFrom:
  - secretRef:
      name: mtg-library-secrets

ingress:
  enabled: false
  className: nginx
  host: ""
  path: /dracolich/mtg-library/api/v0
  annotations: {}
  tls: []
