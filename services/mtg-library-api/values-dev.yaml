# Dev environment overrides
image:
  tag: mtg-library-api-1.3.1
ingress:
  enabled: true
  className: nginx
  host: dev.dracolich.cc
  path: /dracolich/mtg-library/api/v0
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - hosts:
        - dev.dracolich.cc
      secretName: dev-dracolich-cc-tls
