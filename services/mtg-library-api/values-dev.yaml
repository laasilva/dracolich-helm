# Dev environment overrides
image:
  tag: mtg-library-api-1.4.0
ingress:
  enabled: true
  className: nginx
  host: dev.dracolich.app
  path: /dracolich/mtg-library/api/v0
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    - hosts:
        - dev.dracolich.app
      secretName: dev-dracolich-app-tls
