replicaCount: 1

image:
  repository: laaasilva/dracolich
  tag: deck-builder-api-latest
  pullPolicy: IfNotPresent

service:
  appPort: 8080
  managementPort: 7980

probes:
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness
  livenessInitialDelaySeconds: 30
  readinessInitialDelaySeconds: 10

resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 768Mi

env:
  SPRING_PROFILES_ACTIVE: dev
  DRACOLICH_MTG_LIBRARY_API_BASE_URL: http://mtg-library-api:8080/dracolich/mtg-library/api/v0
  DRACOLICH_AI_API_BASE_URL: http://ai-api:8080/dracolich/ai/api/v0
  # Spring relaxed binding maps DRACOLICH_JWT_PUBLIC_KEY env var → dracolich.jwt.public-key property
  DRACOLICH_JWT_PUBLIC_KEY: file:/etc/dracolich/keys/ec-public.pem

envFrom:
  - secretRef:
      name: deck-builder-api-secrets

# JWT public key (copied from user-api). Created out-of-band:
# kubectl create secret generic deck-builder-api-jwt-keys --from-file=ec-public.pem=...
volumes:
  - name: jwt-keys
    secret:
      secretName: deck-builder-api-jwt-keys

volumeMounts:
  - name: jwt-keys
    mountPath: /etc/dracolich/keys
    readOnly: true

ingress:
  enabled: false
  className: nginx
  host: ""
  path: /dracolich/mtg-deck-builder/api/v0
  annotations: {}
  tls: []
