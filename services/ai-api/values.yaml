replicaCount: 1

image:
  repository: laaasilva/dracolich
  tag: ai-api-latest
  pullPolicy: IfNotPresent

service:
  appPort: 8080
  managementPort: 7980

probes:
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness
  livenessInitialDelaySeconds: 30
  readinessInitialDelaySeconds: 10

resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 768Mi

env:
  SPRING_PROFILES_ACTIVE: dev
  # In-cluster DNS for the mtg-library-api Service. Spring relaxed binding maps
  # this env var → dracolich.mtg-library.api.base-url property.
  DRACOLICH_MTG_LIBRARY_API_BASE_URL: http://mtg-library-api:8080/dracolich/mtg-library/api/v0

# ai-api secrets: ANTHROPIC_API_KEY, MONGODB_URI, MONGODB_DATABASE, CORS_ALLOWED_ORIGINS.
envFrom:
  - secretRef:
      name: ai-api-secrets

# ai-api is internal-only — no Ingress, no public DNS.
# Only deck-builder-api should reach it (cluster-internal Service DNS).
ingress:
  enabled: false
