replicaCount: 1

image:
  repository: laaasilva/dracolich
  tag: user-api-latest
  pullPolicy: IfNotPresent

service:
  appPort: 8080
  managementPort: 7980

probes:
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness
  livenessInitialDelaySeconds: 30
  readinessInitialDelaySeconds: 10

resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 768Mi

env:
  SPRING_PROFILES_ACTIVE: dev
  # Spring relaxed binding maps DRACOLICH_JWT_PRIVATE_KEY env var → dracolich.jwt.private-key property
  DRACOLICH_JWT_PRIVATE_KEY: file:/etc/dracolich/keys/ec-private.pem

# user-api needs: MONGODB_URI, anon cookie secret, AWS SES creds.
# JWT private key comes from a separate Secret mounted as a file (see volumes below).
envFrom:
  - secretRef:
      name: user-api-secrets

# JWT private key mounted as a file. The Secret `user-api-jwt-keys` is created
# out-of-band via `kubectl create secret generic ... --from-file=ec-private.pem=...`.
volumes:
  - name: jwt-keys
    secret:
      secretName: user-api-jwt-keys

volumeMounts:
  - name: jwt-keys
    mountPath: /etc/dracolich/keys
    readOnly: true

ingress:
  enabled: false
  className: nginx
  host: ""
  path: /dracolich-user/api/v0
  annotations: {}
  tls: []
