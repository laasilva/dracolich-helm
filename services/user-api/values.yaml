replicaCount: 1

image:
  repository: laaasilva/dracolich
  tag: user-api-latest
  pullPolicy: IfNotPresent

service:
  appPort: 8080
  managementPort: 7980

probes:
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness
  livenessInitialDelaySeconds: 30
  readinessInitialDelaySeconds: 10

resources:
  requests:
    cpu: 100m
    memory: 384Mi
  limits:
    cpu: 500m
    memory: 768Mi

env:
  SPRING_PROFILES_ACTIVE: dev

# user-api needs: MONGODB_URI, JWT private key (PEM), anon cookie secret, AWS SES creds.
# JWT key is currently classpath:keys/ec-private.pem — switching to an env-injected
# PEM string requires an app-side config change (or volume-mount via Secrets Store CSI later).
envFrom:
  - secretRef:
      name: user-api-secrets

ingress:
  enabled: false
  className: nginx
  host: ""
  path: /dracolich-user/api/v0
  annotations: {}
  tls: []
